# 规则集配置
rule-providers:
  reject:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt"
    path: ./ruleset/reject.yaml
    interval: 86400

  private:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/private.txt"
    path: ./ruleset/private.yaml
    interval: 86400

  proxy:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/proxy.txt"
    path: ./ruleset/proxy.yaml
    interval: 86400

  direct:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/direct.txt"
    path: ./ruleset/direct.yaml
    interval: 86400

# 自定义策略组配置
proxy-groups:
  # ===== 服务策略组 =====
  - name: "通用代理"
    type: select
    proxies:
      - "香港"
      - "台湾"
      - "日本"
      - "韩国"
      - "新加坡"
      - "英国"
      - "美国"
      - "DIRECT"

  - name: "AI访问"
    type: select
    proxies:
      - "香港"
      - "台湾"
      - "日本"
      - "韩国"
      - "新加坡"
      - "英国"
      - "美国"
      - "通用代理"
      - "DIRECT"

  - name: "Apple 服务"
    type: select
    proxies:
      - "香港"
      - "台湾"
      - "日本"
      - "韩国"
      - "新加坡"
      - "英国"
      - "美国"
      - "通用代理"
      - "DIRECT"

  - name: "支付钱包"
    type: select
    proxies:
      - "香港"
      - "台湾"
      - "日本"
      - "韩国"
      - "新加坡"
      - "英国"
      - "美国"
      - "通用代理"
      - "DIRECT"

  # ===== 地区节点（自动筛选）=====
  - name: "香港"
    type: fallback
    include-all: true
    filter: "(?i)^(?!.*cn).*(港|hk|hongkong|hong.?kong)"
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: "台湾"
    type: fallback
    include-all: true
    filter: "(?i)^(?!.*cn).*(台湾|tw|taiwan)"
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: "日本"
    type: fallback
    include-all: true
    filter: "(?i)^(?!.*cn).*(日本|jp|japan)"
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: "韩国"
    type: fallback
    include-all: true
    filter: "(?i)^(?!.*cn).*(韩国|kr|korea)"
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: "新加坡"
    type: fallback
    include-all: true
    filter: "(?i)^(?!.*cn).*(新加坡|singapore|(^|[^a-z])(sg|sgp)([^a-z]|$))"
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: "英国"
    type: fallback
    include-all: true
    filter: "(?i)^(?!.*cn).*(英国|uk|britain|united.?kingdom)"
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: "美国"
    type: fallback
    include-all: true
    filter: "(?i)^(?!.*cn).*(美国|us|america|united.?states)"
    url: http://www.gstatic.com/generate_204
    interval: 300

# 自定义分流规则（从上到下逐条匹配，命中即停）
rules:
  # ===== 网络基础 =====
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - RULE-SET,private,DIRECT
  - RULE-SET,reject,REJECT

  # ===== 显式直连 =====
  # 中国域名
  - DOMAIN-SUFFIX,cn,DIRECT
  - DOMAIN-SUFFIX,zhongyibaike.com,DIRECT

  # ===== 游戏下载直连 =====
